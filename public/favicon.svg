  <rect width="32" height="32" rx="7" fill="#0F0F10"/>

  <!-- Left arm of A -->
  <polygon points="14,4 18,4 8,28 4,28" fill="#F5F2EC"/>
  <!-- Right arm of A -->
  <polygon points="14,4 18,4 28,28 24,28" fill="#F5F2EC"/>
  <!-- Crossbar -->
